name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write  # needed to push version bump + gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          npm version "$NEW_VERSION" --no-git-tag-version

          DATE=$(date +%Y-%m-%d)
          TEMP=$(mktemp)
          awk -v ver="$NEW_VERSION" -v date="$DATE" '
            /^## \[Unreleased\]/ {
              print
              print ""
              print "---"
              print ""
              print "## [" ver "] - " date
              print ""
              print "### Changed"
              print "- Deployed version " ver
              next
            }
            { print }
          ' CHANGELOG.md > "$TEMP" && mv "$TEMP" CHANGELOG.md

          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true

      # Pushes dist/ to the gh-pages branch — no special GitHub settings needed.
      # In repo Settings → Pages, set source: "Deploy from a branch" → gh-pages / root
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "deploy: v${{ steps.bump.outputs.new_version }}"
