name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write  # push version bump commit, git tags, gh-pages branch, create releases

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Version bump + release ── only when triggered via workflow_dispatch
      - name: Bump version and tag release
        if: github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "$BUMP_TYPE" in
            major) NEW_VERSION="$((major + 1)).0.0" ;;
            minor) NEW_VERSION="$major.$((minor + 1)).0" ;;
            patch) NEW_VERSION="$major.$minor.$((patch + 1))" ;;
          esac

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          npm version "$NEW_VERSION" --no-git-tag-version

          DATE=$(date +%Y-%m-%d)
          TEMP=$(mktemp)
          awk -v ver="$NEW_VERSION" -v date="$DATE" '
            /^## \[Unreleased\]/ {
              print
              print ""
              print "---"
              print ""
              print "## [" ver "] - " date
              print ""
              print "### Changed"
              print "- Released version " ver
              next
            }
            { print }
          ' CHANGELOG.md > "$TEMP" && mv "$TEMP" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push
          git push origin "v$NEW_VERSION"

      # ── For plain pushes, read version and tag it if not already tagged
      - name: Read current version and tag release
        if: github.event_name != 'workflow_dispatch'
        id: current_ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git tag | grep -q "^v${VERSION}$"; then
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found && NF{print}" CHANGELOG.md)
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${NOTES:-Released version $VERSION}" \
            --latest

      - name: Create GitHub Release for push-triggered deploys
        if: github.event_name != 'workflow_dispatch' && steps.current_ver.outputs.tagged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.current_ver.outputs.new_version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found && NF{print}" CHANGELOG.md)
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${NOTES:-Released version $VERSION}" \
            --latest

      # In repo Settings → Pages, set source: "Deploy from a branch" → gh-pages / root
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "deploy: v${{ steps.bump.outputs.new_version || steps.current_ver.outputs.new_version }}"
